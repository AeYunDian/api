  lang=""
  class="is-in-iframe iframe-level-1 theme-passport"
>
  <head>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="./login.css" />
    <link rel="stylesheet" type="text/css" href="./toast.css" />
    <link rel="stylesheet" type="text/css" href="./header-title.css" />
    <script defer src="./header-title.js"></script>
    <script async src="./toast.js"></script>
    <script defer src="./basicui.js"></script>
    <script defer src="./userinput.js"></script>
    <meta charset="utf-8" />
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>登录</title>
    <script></script>
  </head>

  <body style="background-color: transparent" class="">
    <div class="app">
      <div class="outcard">
        <div class="login-page">
          <div alt="" class="card-close"></div>
          <div class="card-header">
            <span class="card-header-title">A</span>
            <span class="card-header-title">y</span>
            <span class="card-header-title">A</span>
            <span class="card-header-title">c</span>
            <span class="card-header-title">c</span>
            <span class="card-header-title">o</span>
            <span class="card-header-title">u</span>
            <span class="card-header-title">n</span>
            <span class="card-header-title">t</span>
          </div>
          <div class="tabs">
            <div class="nav-warp">
              <div class="navlist">
                <div class="login nav-item active">&nbsp;登录&nbsp;</div>
                <div class="register nav-item" style="margin-left: 72px">
                  &nbsp;注册&nbsp;
                </div>
                <div
                  class="active-bar"
                  style="width: 64px; transform: translateX(94.4px)"
                ></div>
              </div>
            </div>
          </div>
          <form class="register-form form">
            <div class="regUsername input">
              <input type="text" placeholder="用户名" id="regUsername" />
            </div>
            <div class="regEmail input">
              <input type="email" placeholder="邮箱" id="regEmail" />
            </div>
            <div class="regPassword input">
              <input
                type="password"
                placeholder="密码"
                id="regPassword"
                autocomplete="new-password"
              />
            </div>
            <div class="regPasswordConfirm input">
              <input
                type="password"
                placeholder="请再次输入密码"
                autocomplete="new-password"
                id="regPasswordConfirm"
              />
            </div>
            <div class="regAgreement">
              <span class="checkbox"></span>
              <span class="checkbox-label"
                >我已阅读并同意
                <a
                  href="https://undz.cn/privacy_policy/zh-cn.html"
                  target="_blank"
                  >《隐私政策》</a
                >、<a
                  href="https://undz.cn/cookie_policy/zh-cn.html"
                  target="_blank"
                  >《Cookie 政策》</a
                ><br />和<a
                  href="https://undz.cn/terms/zh-cn.html"
                  target="_blank"
                  >《服务条款》</a
                ></span
              >
            </div>
            <div class="reg">
              <button type="submit" class="regBtn button">
                <span>注册</span>
              </button>
            </div>
          </form>
          <form class="login-form form active-form">
            <div class="loginUsernameOrEmail input">
              <input
                type="text"
                placeholder="用户名/邮箱"
                id="loginUsernameOrEmail"
              />
            </div>
            <div class="loginPassword input">
              <input
                type="password"
                placeholder="密码"
                id="loginPassword"
                autocomplete="current-password"
              />
            </div>
            <div class="loginAgreement">
              <span class="checkbox"></span>
              <span class="checkbox-label"
                >我已阅读并同意
                <a
                  href="https://undz.cn/privacy_policy/zh-cn.html"
                  target="_blank"
                  >《隐私政策》</a
                >、<a
                  href="https://undz.cn/cookie_policy/zh-cn.html"
                  target="_blank"
                  >《Cookie 政策》</a
                ><br />和<a
                  href="https://undz.cn/terms/zh-cn.html"
                  target="_blank"
                  >《服务条款》</a
                ></span
              >
            </div>
            <div class="login">
              <button type="submit" class="loginBtn button">
                <span>登录</span>
              </button>
            </div>
          </form>
          <div class="haveQuestionBox">
            <a href="javascript:void(0);" class="haveQuestion">遇到问题</a>
          </div>
        </div>
      </div>
    </div>
