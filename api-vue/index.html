<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 字体异步加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap"
      />
    </noscript>

    <title>Graduation Yearbook</title>

    <style>
      /* ===== 加载容器 ===== */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #ffffff;
        z-index: 9999;
        transition: opacity 0.6s ease;
        pointer-events: all;
      }

      #app-loading.hide {
        opacity: 0;
        pointer-events: none;
      }

      /* ===== 加载器 ===== */
      .loading-wrapper {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
      }

      .circular {
        display: inline;
        height: 30px;
        width: 30px;
        animation: loading-rotate 1.3s linear infinite;
      }
      .loading-path {
        animation: loading-dash 1.5s ease-in-out infinite;
        stroke-dasharray: 90, 150;
        stroke-dashoffset: 0;
        stroke-width: 2;
        stroke: #409eff;
        stroke-linecap: round;
      }
      .loading-path .dot1 {
        transform: translate(3.75px, 3.75px);
        fill: #409eff;
        animation: custom-spin-move 1s infinite linear alternate;
        opacity: 0.3;
      }

      .loading-path .dot2 {
        transform: translate(calc(100% - 3.75px), 3.75px);
        fill: #409eff;
        animation: custom-spin-move 1s infinite linear alternate;
        opacity: 0.3;
        animation-delay: 0.4s;
      }

      .loading-path .dot3 {
        transform: translate(3.75px, calc(100% - 3.75px));
        fill: #409eff;
        animation: custom-spin-move 1s infinite linear alternate;
        opacity: 0.3;
        animation-delay: 1.2s;
      }

      .loading-path .dot4 {
        transform: translate(calc(100% - 3.75px), calc(100% - 3.75px));
        fill: #409eff;
        animation: custom-spin-move 1s infinite linear alternate;
        opacity: 0.3;
        animation-delay: 0.8s;
      }

      /* ===== 关键帧动画 ===== */
      @keyframes loading-rotate {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes dot-fade {
        to {
          opacity: 1;
        }
      }

      @keyframes loading-dash {
        0% {
          stroke-dasharray: 1, 200;
          stroke-dashoffset: 0;
        }

        50% {
          stroke-dasharray: 90, 150;
          stroke-dashoffset: -40px;
        }

        100% {
          stroke-dasharray: 90, 150;
          stroke-dashoffset: -120px;
        }
      }

      @keyframes custom-spin-move {
        to {
          opacity: 1;
        }
      }
      /* ===== 文字提示 ===== */
      .loading-text {
        margin-top: 16px;
        font-size: 14px;
        color: #909399;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        letter-spacing: 0.5px;
      }
    </style>
  </head>

  <body>
    <div id="app-loading">
      <div class="loading-wrapper">
        <svg class="circular" viewBox="0 0 20 20">
          <g class="loading-path" stroke-width="0" style="animation: none; stroke: none">
            <circle r="3.375" class="dot1" cx="0" cy="0" />
            <circle r="3.375" class="dot2" cx="0" cy="0" />
            <circle r="3.375" class="dot4" cx="0" cy="0" />
            <circle r="3.375" class="dot3" cx="0" cy="0" />
          </g>
        </svg>
      </div>
      <div class="loading-text">加载中...</div>
    </div>

    <div id="app"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
