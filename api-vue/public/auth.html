<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>认证 SDK 全功能演示</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 700px;
            margin: 2rem auto;
            padding: 1rem;
            background: #f7f9fc;
        }
        h1 {
            color: #1a202c;
        }
        .section {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .section h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }
        input, button {
            padding: 0.5rem 0.75rem;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            max-width: 280px;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        button {
            background: #3182ce;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover {
            background: #2b6cb0;
        }
        button:active {
            background: #2c5282;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .result {
            background: #edf2f7;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 0.75rem;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .success {
            border-left: 4px solid #38a169;
        }
        .error {
            border-left: 4px solid #e53e3e;
        }
        .info {
            font-size: 0.9rem;
            color: #4a5568;
            margin-top: 0.5rem;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        label {
            font-weight: 500;
            display: inline-block;
            width: 80px;
        }
        .inline-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        .inline-group input {
            flex: 1 1 180px;
        }
    </style>
</head>
<body>

<h1>🔐 认证 SDK · 全功能演示</h1>

<!-- ======================== 初始化 & 语言切换 ======================== -->
<div class="section">
    <h2>📌 初始化 & 语言切换</h2>
    <div class="flex-row">
        <button id="initBtn">初始化客户端（默认 zh-cn）</button>
        <button id="langZhBtn">切换到 中文</button>
        <button id="langEnBtn">切换到 English</button>
        <button id="langHkBtn">切换到 粤语</button>
    </div>
    <div class="info">当前语言：<span id="currentLang">未初始化</span></div>
</div>

<!-- ======================== 注册 ======================== -->
<div class="section">
    <h2>📝 注册</h2>
    <div class="inline-group">
        <input id="regUsername" placeholder="用户名" />
        <input id="regEmail" placeholder="邮箱" />
        <input id="regPassword" type="password" placeholder="密码" />
        <button id="registerBtn">注册</button>
    </div>
    <div id="registerResult" class="result">等待操作…</div>
</div>

<!-- ======================== 登录 ======================== -->
<div class="section">
    <h2>🔑 登录</h2>
    <div class="inline-group">
        <input id="loginUsername" placeholder="用户名或邮箱" />
        <input id="loginPassword" type="password" placeholder="密码" />
        <button id="loginBtn">登录</button>
    </div>
    <div id="loginResult" class="result">等待操作…</div>
</div>

<!-- ======================== 验证 ======================== -->
<div class="section">
    <h2>✅ 验证令牌</h2>
    <button id="verifyBtn">验证当前 access_token</button>
    <div id="verifyResult" class="result">等待操作…</div>
</div>

<!-- ======================== 刷新 ======================== -->
<div class="section">
    <h2>🔄 刷新令牌</h2>
    <button id="refreshBtn">刷新 access_token</button>
    <div id="refreshResult" class="result">等待操作…</div>
</div>

<!-- ======================== 修改密码 ======================== -->
<div class="section">
    <h2>🔒 修改密码</h2>
    <div class="inline-group">
        <input id="oldPwd" type="password" placeholder="旧密码" />
        <input id="newPwd" type="password" placeholder="新密码" />
        <button id="changePwdBtn">修改密码</button>
    </div>
    <div class="info">⚠️ 修改成功后所有刷新令牌将被撤销，需要重新登录</div>
    <div id="changePwdResult" class="result">等待操作…</div>
</div>

<!-- ======================== 登出 ======================== -->
<div class="section">
    <h2>🚪 登出</h2>
    <button id="logoutBtn">登出</button>
    <div id="logoutResult" class="result">等待操作…</div>
</div>

<!-- ============================================================= -->
<script type="importmap">
{
    "imports": {
        "auth-sdk": "https://online.undz.cn/auth-sdk.js"
    }
}
</script>

<script type="module">
    // ----- 导入 SDK -----
    // 如果 SDK 没有部署在线上，可将上面 importmap 中的 URL 改为本地路径，例如 "./auth-sdk.js"
    import { createAuthClient } from 'auth-sdk';

    // ----- 全局变量 -----
    let auth = null;

    // ----- 工具函数：显示结果 -----
    function showResult(element, data, isError = false) {
        let text;
        if (data instanceof Error) {
            text = `❌ ${data.message}`;
            if (data.error_code) text += ` (code: ${data.error_code})`;
        } else if (typeof data === 'string') {
            text = data;
        } else {
            text = JSON.stringify(data, null, 2);
        }
        element.textContent = text;
        element.className = `result ${isError ? 'error' : 'success'}`;
    }

    // ----- 1. 初始化客户端 -----
    function initClient(lang = 'zh-cn') {
        try {
            auth = createAuthClient({
                baseURL: 'https://online.undz.cn',
                appId: 'api',
                i18n: lang
            });
            document.getElementById('currentLang').textContent = lang;
            showResult(document.getElementById('loginResult'), '客户端已初始化，语言：' + lang);
        } catch (e) {
            showResult(document.getElementById('loginResult'), e, true);
        }
    }

    document.getElementById('initBtn').addEventListener('click', () => initClient('zh-cn'));
    document.getElementById('langZhBtn').addEventListener('click', () => {
        if (auth) {
            auth.changeLanguage('zh-cn');
            document.getElementById('currentLang').textContent = 'zh-cn';
            showResult(document.getElementById('loginResult'), '已切换到 中文');
        } else {
            initClient('zh-cn');
        }
    });
    document.getElementById('langEnBtn').addEventListener('click', () => {
        if (auth) {
            auth.changeLanguage('en-us');
            document.getElementById('currentLang').textContent = 'en-us';
            showResult(document.getElementById('loginResult'), 'Switched to English');
        } else {
            initClient('en-us');
        }
    });
    document.getElementById('langHkBtn').addEventListener('click', () => {
        if (auth) {
            auth.changeLanguage('zh-hk');
            document.getElementById('currentLang').textContent = 'zh-hk';
            showResult(document.getElementById('loginResult'), '已切換到 粤語');
        } else {
            initClient('zh-hk');
        }
    });

    // 自动初始化（默认中文）
    initClient('zh-cn');

    // ----- 2. 注册 -----
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        if (!username || !email || !password) {
            showResult(document.getElementById('registerResult'), '请填写用户名、邮箱和密码', true);
            return;
        }
        try {
            const data = await auth.register(username, email, password);
            showResult(document.getElementById('registerResult'), { success: true, message: data.message || '注册成功', data });
        } catch (err) {
            showResult(document.getElementById('registerResult'), err, true);
        }
    });

    // ----- 3. 登录 -----
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!username || !password) {
            showResult(document.getElementById('loginResult'), '请填写用户名/邮箱和密码', true);
            return;
        }
        try {
            const data = await auth.login(username, password);
            showResult(document.getElementById('loginResult'), { success: true, user: data.user });
        } catch (err) {
            showResult(document.getElementById('loginResult'), err, true);
        }
    });

    // ----- 4. 验证 -----
    document.getElementById('verifyBtn').addEventListener('click', async () => {
        try {
            const data = await auth.verify();
            showResult(document.getElementById('verifyResult'), { valid: true, user: data.user });
        } catch (err) {
            showResult(document.getElementById('verifyResult'), err, true);
        }
    });

    // ----- 5. 刷新令牌 -----
    document.getElementById('refreshBtn').addEventListener('click', async () => {
        try {
            const data = await auth.refresh();
            showResult(document.getElementById('refreshResult'), { success: true, message: data.message || '令牌已刷新' });
        } catch (err) {
            showResult(document.getElementById('refreshResult'), err, true);
        }
    });

    // ----- 6. 修改密码 -----
    document.getElementById('changePwdBtn').addEventListener('click', async () => {
        const oldPwd = document.getElementById('oldPwd').value.trim();
        const newPwd = document.getElementById('newPwd').value.trim();
        if (!oldPwd || !newPwd) {
            showResult(document.getElementById('changePwdResult'), '请填写旧密码和新密码', true);
            return;
        }
        try {
            const data = await auth.changePassword(oldPwd, newPwd);
            showResult(document.getElementById('changePwdResult'), { success: true, message: data.message || '密码已修改，请重新登录' });
            // 修改成功后，客户端可能退出登录，建议清空密码框
            document.getElementById('oldPwd').value = '';
            document.getElementById('newPwd').value = '';
        } catch (err) {
            showResult(document.getElementById('changePwdResult'), err, true);
        }
    });

    // ----- 7. 登出 -----
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        try {
            const data = await auth.logout();
            showResult(document.getElementById('logoutResult'), { success: true, message: data.message || '已登出' });
        } catch (err) {
            showResult(document.getElementById('logoutResult'), err, true);
        }
    });

    // 额外：如果登录失败，可提示刷新令牌
    console.log('✅ SDK 示例已加载，所有函数均可调用');
</script>
</body>
</html>
